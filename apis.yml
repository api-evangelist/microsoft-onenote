aid: microsoft-onenote
name: Microsoft OneNote
description: >-
  Microsoft OneNote is a digital note-taking application. It provides API
  access through Microsoft Graph for managing notebooks, sections, section
  groups, and pages stored in OneDrive or SharePoint.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
